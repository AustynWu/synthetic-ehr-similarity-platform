services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone
      POSTGRES_DB: ehr_similarity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      bash -lc "pip install -r requirements.txt
      && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://capstone:capstone@db:5432/ehr_similarity
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata: